name: Release

on:
  workflow_call:
    inputs:
      tag:
        type: string
        required: true
      assets:
        type: string
        default: ""

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Configure Git user
        run: |
          git config user.name "GitHub Actions"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Ensure tag points to current commit
        env:
          TAG: ${{ inputs.tag }}
        run: |
          git fetch --tags --force

          HEAD_SHA="$(git rev-parse HEAD)"
          TAG_SHA="$(git rev-parse "${TAG}^{commit}" 2>/dev/null || true)"

          if [ -z "${TAG_SHA}" ]; then
            echo "Tag ${TAG} does not exist. Creating it at ${HEAD_SHA}..."
            git tag -a "${TAG}" -m "Version ${TAG}" "${HEAD_SHA}"
            git push origin "${TAG}"
          elif [ "${TAG_SHA}" != "${HEAD_SHA}" ]; then
            echo "Tag ${TAG} points to ${TAG_SHA}, retargeting to ${HEAD_SHA}..."
            git tag -fa "${TAG}" -m "Version ${TAG}" "${HEAD_SHA}"
            git push --force origin "${TAG}"
          else
            echo "Tag ${TAG} already points to HEAD (${HEAD_SHA}). Nothing to do."
          fi

      - name: Check if release exists
        id: release_state
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ inputs.tag }}
        run: |
          if gh release view "${TAG}" >/dev/null 2>&1; then
            echo "Release for ${TAG} already exists."
            echo "release_exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "Release for ${TAG} does not exist."
            echo "release_exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Get previous tag
        id: get_previous_tag
        env:
          TAG: ${{ inputs.tag }}
        run: |
          PREVIOUS_TAG="$(git tag --sort=-creatordate | grep -vx "${TAG}" | head -n 1 || true)"

          if [ -z "${PREVIOUS_TAG}" ]; then
            PREVIOUS_TAG="NONE"
          fi

          echo "previous_tag=${PREVIOUS_TAG}" >> "$GITHUB_OUTPUT"

      - name: Generate changelog
        if: ${{ steps.release_state.outputs.release_exists == 'false' }}
        env:
          PREVIOUS_TAG: ${{ steps.get_previous_tag.outputs.previous_tag }}
        run: |
          if [ "${PREVIOUS_TAG}" = "NONE" ]; then
            echo "No previous tag found. Generating changelog for all commits..."
            git log --pretty=format:"- %h %s" > CHANGELOG.md
          else
            echo "Generating changelog from previous tag: ${PREVIOUS_TAG}"
            git log "${PREVIOUS_TAG}"..HEAD --pretty=format:"- %h %s" > CHANGELOG.md
          fi

      - name: Download assets
        if: ${{ inputs.assets != '' && steps.release_state.outputs.release_exists == 'false' }}
        uses: actions/download-artifact@v8
        with:
          name: ${{ inputs.assets }}
          path: _assets

      - name: Create release (if missing)
        if: ${{ steps.release_state.outputs.release_exists == 'false' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ inputs.tag }}
        run: |
          gh release create "${TAG}" \
            --title "${TAG}" \
            --notes-file CHANGELOG.md \
            --draft=false

      - name: Upload assets to newly created release
        if: ${{ inputs.assets != '' && steps.release_state.outputs.release_exists == 'false' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ inputs.tag }}
        run: |
          if ls _assets/* >/dev/null 2>&1; then
            gh release upload "${TAG}" _assets/* --clobber
          else
            echo "No assets found in _assets; skipping upload."
          fi
