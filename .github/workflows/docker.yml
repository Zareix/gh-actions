name: Docker build image

on:
  workflow_call:
    inputs:
      tag:
        type: string
        default: latest
      registry:
        type: string
        default: ghcr.io
      image-name:
        type: string
        default: ${{ github.repository }}
      push-image:
        type: boolean
        default: false
      arm64:
        type: boolean
        default: true
        description: Whether to also build for linux/arm64 in addition to linux/amd64

jobs:
  setup-matrix:
    name: Setup build matrix
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
      image-name: ${{ steps.set-image-name.outputs.image-name }}
    steps:
      - name: Lowercase image name
        id: set-image-name
        run: echo "image-name=$(echo '${{ inputs.image-name }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

      - name: Set matrix
        id: set-matrix
        run: |
          if [ "${{ inputs.arm64 }}" = "true" ]; then
            echo 'matrix={"include":[{"platform":"linux/amd64","runner":"ubuntu-latest"},{"platform":"linux/arm64","runner":"ubuntu-24.04-arm"}]}' >> $GITHUB_OUTPUT
          else
            echo 'matrix={"include":[{"platform":"linux/amd64","runner":"ubuntu-latest"}]}' >> $GITHUB_OUTPUT
          fi

  docker-build:
    name: Build ${{ inputs.push-image && 'and push' || '' }} docker image (${{ matrix.platform }})
    runs-on: ${{ matrix.runner }}
    needs: setup-matrix
    permissions:
      contents: read
      packages: write
      id-token: write
    env:
      working-directory: .
      image-name: ${{ needs.setup-matrix.outputs.image-name }}
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.setup-matrix.outputs.matrix) }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install cosign
        uses: sigstore/cosign-installer@main
        with:
          cosign-release: "v2.0.0-rc.0"

      - name: Setup Docker buildx
        uses: docker/setup-buildx-action@v3

      - name: Log into registry ${{ inputs.registry }}
        uses: docker/login-action@v4
        with:
          registry: ${{ inputs.registry }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ inputs.registry }}/${{ env.image-name }}

      - name: Build ${{ inputs.push-image && 'and push' || '' }} docker image
        id: build-and-push
        uses: docker/build-push-action@v6
        with:
          context: ${{ env.working-directory }}
          push: ${{ inputs.push-image }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: ${{ matrix.platform }}
          outputs: type=image,name=${{ inputs.registry }}/${{ env.image-name }},push-by-digest=true,name-canonical=true,push=${{ inputs.push-image }}

      - name: Export digest
        if: ${{ inputs.push-image }}
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build-and-push.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - name: Upload digest
        if: ${{ inputs.push-image }}
        uses: actions/upload-artifact@v4
        with:
          name: digests-${{ matrix.runner }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  docker-merge:
    name: Merge and push multi-platform manifest
    if: ${{ inputs.push-image }}
    runs-on: ubuntu-latest
    needs:
      - setup-matrix
      - docker-build
    permissions:
      contents: read
      packages: write
      id-token: write
    env:
      image-name: ${{ needs.setup-matrix.outputs.image-name }}
    steps:
      - name: Download digests
        uses: actions/download-artifact@v4
        with:
          path: /tmp/digests
          pattern: digests-*
          merge-multiple: true

      - name: Setup Docker buildx
        uses: docker/setup-buildx-action@v3

      - name: Log into registry ${{ inputs.registry }}
        uses: docker/login-action@v4
        with:
          registry: ${{ inputs.registry }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ inputs.registry }}/${{ env.image-name }}
          tags: |
            type=raw,value=latest
            type=semver,pattern={{raw}},value=${{ inputs.tag }}

      - name: Create and push multi-platform manifest
        working-directory: /tmp/digests
        run: |
          docker buildx imagetools create \
            $(jq -cr '.tags | map("-t " + .) | join(" ")' <<< "$DOCKER_METADATA_OUTPUT_JSON") \
            $(printf '${{ inputs.registry }}/${{ env.image-name }}@sha256:%s ' *)

      - name: Inspect image
        run: |
          docker buildx imagetools inspect ${{ inputs.registry }}/${{ env.image-name }}:${{ steps.meta.outputs.version }}
